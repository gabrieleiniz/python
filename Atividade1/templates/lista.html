<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Alunos</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div class="container">

        <h1>Sistema de Alunos</h1>

        <a class="novo" href="{{ url_for('cadastrar') }}">
            Cadastrar Aluno
        </a>

        <hr>

        {% if alunos %}

            {% for aluno in alunos %}

                <div class="card">

                    <p><strong>ID:</strong> {{ aluno.id }}</p>
                    <p><strong>Nome:</strong> {{ aluno.nome }}</p>
                    <p><strong>E-mail:</strong> {{ aluno.email }}</p>

                    <a href="{{ url_for('editar', aluno_id=aluno.id) }}">
                        Editar
                    </a>

                    <form method="POST"
                          action="{{ url_for('excluir', aluno_id=aluno.id) }}"
                          style="display:inline;">

                        <button type="submit">
                            Excluir
                        </button>

                    </form>

                </div>

            {% endfor %}

        {% else %}

            <p>Nenhum aluno cadastrado.</p>

        {% endif %}

    </div>

</body>
</html>
